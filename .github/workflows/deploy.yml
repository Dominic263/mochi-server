name: Build & Deploy

# Mirrors the Clarity pipeline: push to main → build the Docker image on
# GitHub's runners → push to ghcr → poke the Coolify deploy webhook.
#
# The mochi box (Hetzner CAX21) is arm64, so we build natively on GitHub's
# free arm64 runners — no QEMU emulation, Swift release builds finish in
# minutes instead of an hour.
#
# The webhook step only runs once the repo secrets exist:
#   COOLIFY_WEBHOOK — the app's deploy webhook URL from the Coolify dashboard
#   COOLIFY_TOKEN   — a Coolify API token (Keys & Tokens → API tokens)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/dominic263/mochi-server:latest
            ghcr.io/dominic263/mochi-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify deploy
        if: ${{ vars.COOLIFY_DEPLOY_ENABLED == 'true' }}
        run: |
          curl -fsS -X GET "${{ secrets.COOLIFY_WEBHOOK }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
